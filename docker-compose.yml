version: '3.8'

services:
  # PHP Web Application
  web:
    build: .
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=dfps_user
      - DB_PASS=dfps_password
      - DB_NAME=dfps_db
      - SMS_GATEWAY_URL=http://sms-gateway:3001/send-sms
    depends_on:
      - db
      - sms-gateway

  # MySQL Database
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: dfps_db
      MYSQL_USER: dfps_user
      MYSQL_PASSWORD: dfps_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # SMS Gateway (Node.js)
  sms-gateway:
    build: ./sms
    ports:
      - "3001:3001"
    # Replace /dev/ttyUSB0 with your modem's path if running on Linux/Mac
    # Windows Docker Desktop does not support --device mapping easily; 
    # for Windows, it's recommended to run the sms_server.js natively (non-docker).
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - MODEM_PORT=/dev/ttyUSB0

volumes:
  db_data:
